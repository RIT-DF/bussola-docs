---
layout: default
---
<style>
.docs-layout {
  display: flex;
  gap: 2rem;
  align-items: flex-start;
  margin-top: 1.5rem;
}
.docs-sidebar {
  width: 210px;
  flex-shrink: 0;
  position: sticky;
  top: 1rem;
  border-right: 1px solid #e8e8e8;
  padding-right: 1.25rem;
}
.docs-main {
  flex: 1;
  min-width: 0;
}
.docs-main h1 { margin-top: 0; }
.docs-main img { max-width: 100%; border: 1px solid #e0e0e0; border-radius: 6px; margin: 0.75rem 0; }
@media (max-width: 700px) {
  .docs-layout { flex-direction: column; }
  .docs-sidebar { width: 100%; border-right: none; border-bottom: 1px solid #e8e8e8; padding-bottom: 1rem; position: static; }
}
</style>
<div class="docs-layout">
  <aside class="docs-sidebar">
    {%- include sidebar.html -%}
  </aside>
  <div class="docs-main">
    <h1>{{ page.title | escape }}</h1>
    {{ content }}
    <hr style="margin-top:2rem;">
    <p style="font-size:0.8rem; color:#888;">Bússola Financeira v0.10 (beta) · <a href="https://rit.org.br">RIT</a> · <a href="mailto:dpo@rit.org.br">dpo@rit.org.br</a></p>
  </div>
</div>
