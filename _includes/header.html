<header class="site-header" role="banner">
  <div class="wrapper">
    <div style="display:flex; align-items:center; gap:1.25rem; padding:0.5rem 0;">
      <a href="https://rit.org.br" target="_blank" rel="noopener noreferrer">
        <img src="https://assets.rit.org.br/logo/rit-logo-composta.svg"
             alt="RIT — Rede de Inovação e Transformação"
             style="height:44px; width:auto; display:block;">
      </a>
      <span style="color:#ddd; font-size:1.4rem; line-height:1; font-weight:200;">|</span>
      <a class="site-title" rel="author" href="{{ '/' | relative_url }}">
        {{- site.title | escape -}}
      </a>
    </div>
  </div>
</header>
